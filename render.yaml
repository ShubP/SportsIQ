# Render Blueprint for the CourtIQ API (FastAPI).
# The frontend deploys separately on Vercel; the DB is Neon Postgres.
services:
  - type: web
    name: courtiq-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn courtiq.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL        # Neon Postgres URL (postgresql+psycopg2://...)
        sync: false
      - key: THE_ODDS_API_KEY    # from the-odds-api.com
        sync: false
      - key: FRONTEND_ORIGIN     # your Vercel URL, e.g. https://courtiq.vercel.app
        sync: false
      - key: SEASON
        value: "2026"
