name: CourtIQ data pipeline

# Refreshes schedule, retrains models, pulls live lines, and writes the edge
# board to the (Neon) database. The API just serves whatever this produces.
on:
  schedule:
    # Once daily at 16:30 UTC (~12:30 ET) when the day's lines are posted.
    # The Odds API free tier is 500 credits/mo and each run costs
    # ~(#markets x #upcoming events) credits, so keep this infrequent.
    - cron: "30 16 * * *"
  workflow_dispatch: {}       # allow manual runs from the Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          ODDS_API_REGION: us
          ODDS_MARKETS: "pitcher_strikeouts,batter_hits,batter_total_bases"
          SEASON: "2026"
        run: python -m courtiq.pipeline
